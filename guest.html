<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Writing</title>
    <link rel="stylesheet" href="guest.css">
</head>
<body>
    <header class="header">
        <div  class="header-text">Guest Writing</div>
        <div class="headerleft">
            <ul>
                <li><a href='#Login'>Log in</a></li>
                <li><a href='#Past Writer'>Guest Writers</a></li>
                
            </ul>
        </div>
             </header>
            <div class="Information-section">

                <h2>Information</h2>
                <br class="innner">
                <form action="#" method="post">
                    <label for="firstname">First Name</label>
                    <input type="text" id="firstname" name="firstname" required></br>
                    <label for="lastname">Last Name</label></form>
                    <input type="text" id="lastname" name="lastname" required></br>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required></br>
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" required></br>
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="4" required></textarea></br>
                </form>
                </div>
            </div>
            <div class="past-writer">
                <h2>Past Guest Writers Blogs</h2>
                <p>I’m grateful to everyone who has contributed to my journey.</p>
                <p>Comming Soon.</p>
            </div>
        <footer class="footer">
            <div class="schedule-Meeting">
                <h2>Schedule a Meeting</h2>
               
            </div>
        </footer>
    
</body>
</html>
